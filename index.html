<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title> -- Shadow Strike ⚔️ -- </title>
</head>
<body>

    <div id="playground" class="container playground">
        <div id="Heroground" class="row Heroground">
            <h1>Hero: <span id="hero-hp">100</span></h1>
                <div class="bar-bg">
                    <div id="hp-value" class="hp-value"></div>
                </div>
        </div>
        <div class="row Msgground">
                <h3 id="round">Round  1 </h3>
                <h6 id="msg"></h6>
        </div>

        <div id="Enemyground" class="row Enemyground">
            <h1>Enemy: <span id="enemy-hp">100</span></h1>
             <div class="bar-bg">
                    <div id="enemy-hp-value" class="hp-value"></div>
                </div>
                
        </div>
    </div> 




    <div class="d-flex justify-content-center gap-3 ">   
       
            <button type="button"  id="heroAttackbtn" class="btn btn-primary btn-lg" onclick="heroAttack()">⚔️ Attack</button>
            <button type="button"  id="heroHealbtn"   class="btn btn-info btn-lg" onclick="heroHeal()">💚 Heal</button>
            <button type="button"  id="heroDefendbtn" class="btn btn-secondary btn-lg" onclick="heroDefend()">🛡️ Defend</button>
            <button type="button"  id="resetbtn"   class="btn btn-info btn-lg" onclick="resetGame()">🔄 restart</button>
           
      
        
    </div>

    

    
    <!-- Bootstrap JS (important for components like modals, dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js" defer></script>

</body>
</html>
